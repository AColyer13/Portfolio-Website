# Publishes npm run build output (dist/). In the repo: Settings → Pages →
# Build and deployment → Source must be "GitHub Actions". If Source is
# "Deploy from a branch", the live site will load /src/main.tsx from the
# repo root and break (404).
name: Deploy Vite site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Must match GitHub Pages URL: …/Portfolio-Website/ (not site root).
          VITE_BASE_PATH: /Portfolio-Website/

      - name: Verify production bundle (built HTML must not reference main.tsx)
        run: |
          if grep -qF 'main.tsx' dist/index.html; then
            echo "dist/index.html still references main.tsx — deploy dist/ from CI, not source index.html."
            echo "Raw .tsx on GitHub Pages is served as application/octet-stream; browsers reject it for type=module."
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
