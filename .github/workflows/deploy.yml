# Builds on push to main and deploys dist/ via GitHub Pages (Actions source).
# No gh-pages branch or docs/ folder on main — the live site is the workflow artifact.
#
# Settings → Pages → Build and deployment → Source: GitHub Actions
# (not “Deploy from a branch”).
name: Deploy Vite site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /Portfolio-Website/

      - name: Verify production bundle (must not reference main.tsx)
        run: |
          if grep -qF 'main.tsx' dist/index.html; then
            echo "dist/index.html still references main.tsx."
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
