# Builds the Vite app and pushes ONLY dist/ to the orphan branch `gh-pages`.
#
# GitHub Pages must publish that branch (not `main`):
#   Settings → Pages → Build and deployment → Deploy from a branch
#   Branch: gh-pages, folder: / (root)
#
# If Source is left on "main" / (root), the site will keep serving source
# index.html and you will see main.tsx MIME / module errors.
name: Deploy Vite site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /Portfolio-Website/

      - name: Verify production bundle (must not reference main.tsx)
        run: |
          if grep -qF 'main.tsx' dist/index.html; then
            echo "dist/index.html still references main.tsx."
            exit 1
          fi

      - name: Push dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
