# Builds on push to main and commits dist/ into docs/ on the same branch.
#
# GitHub Pages: Settings → Pages → Deploy from a branch → Branch: main, Folder: /docs
#
# You cannot use main + / (root): that serves source index.html and main.tsx (wrong MIME).
# The live site URL is still https://<user>.github.io/<repo>/ — docs/ is only the publish folder.
name: Deploy Vite site to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /Portfolio-Website/

      - name: Verify production bundle (must not reference main.tsx)
        run: |
          if grep -qF 'main.tsx' dist/index.html; then
            echo "dist/index.html still references main.tsx."
            exit 1
          fi

      - name: Publish build to docs/ on main
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: main
          folder: dist
          target-folder: docs
          clean: true
          commit-message: 'deploy: update Pages build in docs/ [skip ci]'
