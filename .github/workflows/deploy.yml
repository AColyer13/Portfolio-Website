# Builds the site and copies dist/ → docs/ on main. GitHub Pages must use that
# folder (not the repo root), or the live site will keep serving source index.html
# and you will see main.tsx / blank page errors.
#
# Settings → Pages → Build and deployment → Deploy from a branch
#   Branch: main   Folder: /docs
#
# Pushes that only change docs/ are ignored so the bot’s publish commit does not
# retrigger this workflow in a loop.
name: Deploy Vite site to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /Portfolio-Website/

      - name: Verify production bundle (must not reference main.tsx)
        run: |
          if grep -qF 'main.tsx' dist/index.html; then
            echo "dist/index.html still references main.tsx."
            exit 1
          fi

      - name: Sync dist to docs and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf docs
          mkdir -p docs
          cp -a dist/. docs/
          git add docs
          if git diff --staged --quiet; then
            echo "No changes under docs/ — nothing to publish."
            exit 0
          fi
          git commit -m "chore: publish site to docs/"
          git push
